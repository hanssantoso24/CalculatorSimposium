<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Anggaran Simposium - PPIDK Asia Oceania 2026</title>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
      --color-background-tertiary: #f6f7f8;
      --color-background-secondary: #f0f2f5;
      --color-background-primary: #ffffff;
      --color-border-tertiary: #e4e6eb;
      --color-text-primary: #050505;
      --color-text-secondary: #65676b;
      --color-text-tertiary: #8a8d91;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: var(--color-background-tertiary); color: var(--color-text-primary); }
    input[type="number"] { border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 6px 8px; font-family: var(--font-sans); }
    input[type="number"]:focus { outline: none; border-color: #378ADD; box-shadow: 0 0 0 2px rgba(55, 138, 221, 0.1); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 4px; }
    #root { display: flex; flex-direction: column; min-height: 100vh; }

    @media (max-width: 768px) {
      body { padding: 0 8px; }
      input[type="number"] { padding: 8px 6px; font-size: 16px; }
      [style*="gridTemplateColumns"] { grid-template-columns: 1fr !important; }
      [style*="display: grid"] { grid-template-columns: 1fr !important; }
      [style*="display: flex"][style*="gap"] { flex-direction: column; }
      [style*="padding: 16px 20px"] { padding: 12px 16px !important; }
    }

    @media (max-width: 480px) {
      body { padding: 0 4px; }
      input[type="number"] { padding: 8px 4px; font-size: 16px; }
      [style*="fontSize: 16"] { font-size: 14px !important; }
      [style*="fontSize: 14"] { font-size: 13px !important; }
      [style*="padding: 12px 14px"] { padding: 8px 10px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    const { useState, useMemo } = React;
    const h = React.createElement;
    const formatCurrency = (n) => Math.round(Math.abs(n)).toLocaleString("id-ID");

    function Field({ label, value, onChange, suffix = "Baht", small }) {
      return h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 } },
        h("label", { style: { fontSize: small ? 12 : 13, color: "var(--color-text-secondary)", flex: 1 } }, label),
        h("div", { style: { display: "flex", alignItems: "center", gap: 4 } },
          h("input", { type: "number", min: "0", value, onChange: e => onChange(Math.max(0, Number(e.target.value) || 0)), style: { width: 80, textAlign: "right", fontSize: 13 } }),
          h("span", { style: { fontSize: 11, color: "var(--color-text-tertiary)", width: 30 } }, suffix)
        )
      );
    }

    function Section({ title, accent, children }) {
      const accentColors = { blue: { bg: "#E6F1FB", border: "#378ADD", text: "#0C447C" }, green: { bg: "#EAF3DE", border: "#639922", text: "#3B6D11" }, amber: { bg: "#FAEEDA", border: "#BA7517", text: "#854F0B" }, teal: { bg: "#E1F5EE", border: "#1D9E75", text: "#0F6E56" }, pink: { bg: "#FBEAF0", border: "#D4537E", text: "#993556" }, red: { bg: "#FCEBEB", border: "#E24B4A", text: "#A32D2D" }, purple: { bg: "#EEEDFE", border: "#7F77DD", text: "#3C3489" } };
      const color = accentColors[accent] || accentColors.blue;
      return h("div", { style: { background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: "var(--border-radius-lg)", marginBottom: 12, overflow: "hidden" } },
        h("div", { style: { background: color.bg, borderBottom: `0.5px solid ${color.border}`, padding: "8px 14px", fontSize: 13, fontWeight: 500, color: color.text } }, title),
        h("div", { style: { padding: "12px 14px" } }, children)
      );
    }

    function MetricCard({ label, value, color }) {
      const cardColors = { green: { bg: "#EAF3DE", text: "#3B6D11", val: "#27500A" }, red: { bg: "#FCEBEB", text: "#A32D2D", val: "#791F1F" }, blue: { bg: "#E6F1FB", text: "#185FA5", val: "#0C447C" }, amber: { bg: "#FAEEDA", text: "#854F0B", val: "#633806" }, teal: { bg: "#E1F5EE", text: "#0F6E56", val: "#085041" } };
      const cardColor = cardColors[color] || cardColors.blue;
      return h("div", { style: { background: cardColor.bg, borderRadius: "var(--border-radius-md)", padding: "10px 14px", textAlign: "center" } },
        h("div", { style: { fontSize: 11, color: cardColor.text, marginBottom: 4 } }, label),
        h("div", { style: { fontSize: 20, fontWeight: 500, color: cardColor.val } }, value)
      );
    }

    function App() {
      const [t1n, setT1n] = useState(20); const [t1p, setT1p] = useState(1000); const [t1c, setT1c] = useState(400);
      const [t2n, setT2n] = useState(5); const [t2p, setT2p] = useState(1400); const [t2c, setT2c] = useState(800);
      const [t3n, setT3n] = useState(5); const [t3p, setT3p] = useState(3150); const [t3c, setT3c] = useState(1200);
      const [cityTour, setCityTour] = useState(1350);
      const [yn, setYn] = useState(20); const [yp, setYp] = useState(4000);
      const [pthn, setPthn] = useState(17); const [pthp, setPthp] = useState(4000);
      const [pnonn, setPnonn] = useState(23); const [pnonp, setPnonp] = useState(4000);
      const [pReg, setPReg] = useState(44);
      const [kbriQ, setKbriQ] = useState(70); const [kbriV, setKbriV] = useState(850);
      const [hotelPPN, setHotelPPN] = useState(700); const [hotelN, setHotelN] = useState(4); const [hotelCap, setHotelCap] = useState(2);
      const [souvP, setSouvP] = useState(400); const [souvN, setSouvN] = useState(44);
      const [contPP, setContPP] = useState(600); const [contUsage, setContUsage] = useState(0);

      const c = useMemo(() => {
        const tTotal = t1n + t2n + t3n; const pTotal = pthn + pnonn; const totalPaying = tTotal + yn + pTotal;
        const usedByThai = tTotal + pthn; const sisaKuota = Math.max(0, kbriQ - usedByThai);
        const pnonGratis = Math.min(pnonn, sisaKuota); const pnonBayarVenue = pnonn - pnonGratis;
        const kuotaHangus = Math.max(0, kbriQ - usedByThai - pnonGratis); const venuePayers = pnonBayarVenue + yn;
        const biayaVenue = venuePayers * kbriV; const subsidiTotal = (usedByThai + pnonGratis) * kbriV;
        const revT1 = t1n * t1p; const revT2 = t2n * t2p; const revT3 = t3n * t3p;
        const revY = yn * yp; const revPth = pthn * pthp; const revPnon = pnonn * pnonp;
        const revenue = revT1 + revT2 + revT3 + revY + revPth + revPnon;
        const opsMT1 = t1n * t1c; const opsMT2 = t2n * t2c; const opsMT3 = t3n * t3c;
        const opsMFull = (pTotal + yn) * t3c; const opsCT = (t3n + pTotal + yn) * cityTour;
        const opsTotal = opsMT1 + opsMT2 + opsMT3 + opsMFull + opsCT;
        const rooms = Math.ceil(pTotal / Math.max(1, hotelCap)); const hotelCost = rooms * hotelPPN * hotelN;
        const souvCost = souvN * souvP; const contCollected = totalPaying * contPP;
        const contUsed = contCollected * (contUsage / 100); const contUnused = contCollected - contUsed;
        const totalCost = opsTotal + biayaVenue + hotelCost + souvCost + contUsed;
        const operationalSurplus = revenue - opsTotal - biayaVenue - hotelCost - souvCost;
        const totalSurplus = operationalSurplus + contUnused;
        const margT1 = t1p - t1c; const margT2 = t2p - t2c; const margT3 = t3p - t3c - cityTour;
        const margY = yp - t3c - cityTour - kbriV; const margPth = pthp - t3c - cityTour;
        const avgMargPnon = pnonn > 0 ? (pnonn * pnonp - pnonn * (t3c + cityTour) - pnonBayarVenue * kbriV) / pnonn : 0;
        return { tTotal, pTotal, totalPaying, usedByThai, sisaKuota, pnonGratis, pnonBayarVenue, kuotaHangus, venuePayers, biayaVenue, subsidiTotal, revT1, revT2, revT3, revY, revPth, revPnon, revenue, opsMT1, opsMT2, opsMT3, opsMFull, opsCT, opsTotal, rooms, hotelCost, souvCost, contCollected, contUsed, contUnused, totalCost, operationalSurplus, totalSurplus, margT1, margT2, margT3, margY, margPth, avgMargPnon };
      }, [t1n,t1p,t1c,t2n,t2p,t2c,t3n,t3p,t3c,cityTour,yn,yp,pthn,pthp,pnonn,pnonp,pReg,kbriQ,kbriV,hotelPPN,hotelN,hotelCap,souvP,souvN,contPP,contUsage]);

      const isDeficit = c.totalSurplus < 0;

      return h("div", { style: { fontFamily: "var(--font-sans)", background: "var(--color-background-tertiary)", minHeight: "100vh" } },
        h("div", { style: { background: "var(--color-background-primary)", borderBottom: "0.5px solid var(--color-border-tertiary)", padding: "12px 20px" } },
          h("div", { style: { fontSize: 16, fontWeight: 500, color: "var(--color-text-primary)" } }, "Kalkulator Anggaran Simposium"),
          h("div", { style: { fontSize: 12, color: "var(--color-text-tertiary)" } }, "PPIDK Asia Oceania 2026 · PERMITHA · semua nilai dapat diubah")
        ),
        h("div", { style: { padding: "16px 20px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 } },
          h("div", null,
            h(Section, { title: "Peserta Thailand non-panitia (venue disubsidi KBRI)", accent: "blue" },
              h("div", { style: { display: "grid", gridTemplateColumns: "80px 1fr 1fr", gap: 12, alignItems: "flex-end" } },
                h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", fontWeight: 500, marginBottom: 4 } }, "Durasi"),
                h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", fontWeight: 500, marginBottom: 4 } }, "Jumlah"),
                h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", fontWeight: 500, marginBottom: 4 } }, "Harga tiket"),
                h("div", { style: { fontSize: 12, padding: "4px 0" } }, "1 hari"),
                h("input", { type: "number", min: "0", value: t1n, onChange: e => setT1n(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 12, padding: "6px 8px" } }),
                h("input", { type: "number", min: "0", value: t1p, onChange: e => setT1p(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 12, padding: "6px 8px" } }),
                h("div", { style: { fontSize: 12, padding: "4px 0" } }, "2 hari"),
                h("input", { type: "number", min: "0", value: t2n, onChange: e => setT2n(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 12, padding: "6px 8px" } }),
                h("input", { type: "number", min: "0", value: t2p, onChange: e => setT2p(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 12, padding: "6px 8px" } }),
                h("div", { style: { fontSize: 12, padding: "4px 0" } }, "3 hari"),
                h("input", { type: "number", min: "0", value: t3n, onChange: e => setT3n(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 12, padding: "6px 8px" } }),
                h("input", { type: "number", min: "0", value: t3p, onChange: e => setT3p(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 12, padding: "6px 8px" } })
              )
            ),
            h(Section, { title: "Biaya operasional", accent: "amber" },
              h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 } },
                h("div", null,
                  h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 4 } }, "Hari 1"),
                  h("input", { type: "number", min: "0", value: t1c, onChange: e => setT1c(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 12, marginBottom: 4 } }),
                  h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)" } }, "Baht")
                ),
                h("div", null,
                  h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 4 } }, "Hari 1-2"),
                  h("input", { type: "number", min: "0", value: t2c, onChange: e => setT2c(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 12, marginBottom: 4 } }),
                  h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)" } }, "Baht")
                ),
                h("div", null,
                  h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 4 } }, "Hari 1-3"),
                  h("input", { type: "number", min: "0", value: t3c, onChange: e => setT3c(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 12, marginBottom: 4 } }),
                  h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)" } }, "Baht")
                ),
                h("div", null,
                  h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 4 } }, "Biaya City Tour"),
                  h("input", { type: "number", min: "0", value: cityTour, onChange: e => setCityTour(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 12, marginBottom: 4 } }),
                  h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)" } }, "Baht")
                )
              ),
              h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 8 } }, "(Makan & souvenir per orang untuk setiap durasi, City tour untuk peserta 3 hari + panitia + non-Thai)")
            ),
            h(Section, { title: "Peserta non-Thailand (full 3 hari)", accent: "green" },
              h("div", { style: { fontSize: 11, color: "#A32D2D", marginBottom: 8 } }, "Membayar venue — tidak mendapat subsidi KBRI"),
              h(Field, { label: "Jumlah", value: yn, onChange: setYn, suffix: "org" }),
              h(Field, { label: "Harga tiket", value: yp, onChange: setYp })
            ),
            h(Section, { title: "Panitia", accent: "purple" },
              h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 } },
                h("div", null,
                  h("div", { style: { fontSize: 11, fontWeight: 500, color: "var(--color-text-tertiary)", marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 } }, "Thailand"),
                  h(Field, { label: "Jumlah", value: pthn, onChange: setPthn, suffix: "org", small: true }),
                  h(Field, { label: "Harga tiket", value: pthp, onChange: setPthp, small: true })
                ),
                h("div", null,
                  h("div", { style: { fontSize: 11, fontWeight: 500, color: "var(--color-text-tertiary)", marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 } }, "Non-Thailand"),
                  h(Field, { label: "Jumlah", value: pnonn, onChange: setPnonn, suffix: "org", small: true }),
                  h(Field, { label: "Harga tiket", value: pnonp, onChange: setPnonp, small: true })
                )
              ),
              h("div", { style: { borderTop: "0.5px solid var(--color-border-tertiary)", marginTop: 10, paddingTop: 10 } },
                h(Field, { label: "Total terdaftar (untuk souvenir, termasuk no-show)", value: pReg, onChange: setPReg, suffix: "org", small: true })
              )
            ),
            h(Section, { title: "Subsidi KBRI (venue)", accent: "amber" },
              h(Field, { label: "Kuota total", value: kbriQ, onChange: setKbriQ, suffix: "pax" }),
              h(Field, { label: "Nilai per orang", value: kbriV, onChange: setKbriV }),
              h("div", { style: { background: "#FAEEDA", borderRadius: "var(--border-radius-md)", padding: "10px 12px", marginTop: 10, fontSize: 12, color: "#854F0B" } },
                h("div", null, "Dipakai Thai non-panitia: ", h("b", null, c.tTotal), " + Panitia Thai: ", h("b", null, pthn), " = ", h("b", null, c.usedByThai)),
                h("div", { style: { marginTop: 4 } }, "Sisa → Panitia non-Thai: ", h("b", null, c.pnonGratis), " gratis, ", h("b", null, c.pnonBayarVenue), " bayar venue"),
                h("div", { style: { marginTop: 4, color: c.kuotaHangus > 0 ? "#A32D2D" : "#3B6D11" } }, "Kuota hangus: ", h("b", null, c.kuotaHangus), " pax  |  Total subsidi: ", h("b", null, "฿" + formatCurrency(c.subsidiTotal)))
              )
            ),
            h(Section, { title: "Hotel panitia", accent: "teal" },
              h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 10 } },
                [{ label: "Harga/kamar/malam", val: hotelPPN, set: setHotelPPN }, { label: "Jumlah malam", val: hotelN, set: setHotelN }, { label: "Kapasitas/kamar", val: hotelCap, set: setHotelCap, min: 1 }].map(({ label, val, set, min = 0 }) =>
                  h("div", { key: label },
                    h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 4 } }, label),
                    h("input", { type: "number", min, value: val, onChange: e => set(Math.max(min, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 13 } })
                  )
                )
              ),
              h("div", { style: { background: "#E1F5EE", borderRadius: "var(--border-radius-md)", padding: "8px 12px", fontSize: 12, color: "#0F6E56" } },
                h("b", null, c.rooms, " kamar"), " × ฿", formatCurrency(hotelPPN), " × ", hotelN, " malam = ", h("b", null, "฿" + formatCurrency(c.hotelCost))
              )
            ),
            h(Section, { title: "Souvenir khusus panitia", accent: "pink" },
              h(Field, { label: "Harga per orang", value: souvP, onChange: setSouvP }),
              h(Field, { label: "Jumlah penerima", value: souvN, onChange: setSouvN, suffix: "org" }),
              h("div", { style: { background: "#FBEAF0", borderRadius: "var(--border-radius-md)", padding: "8px 12px", fontSize: 12, color: "#993556" } },
                souvN, " × ฿", formatCurrency(souvP), " = ", h("b", null, "฿" + formatCurrency(c.souvCost))
              )
            ),
            h(Section, { title: "Contingency plan", accent: "red" },
              h(Field, { label: "Nilai per orang", value: contPP, onChange: setContPP }),
              h("div", { style: { marginTop: 12 } },
                h("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: 6 } },
                  h("span", { style: { fontSize: 13, color: "var(--color-text-secondary)" } }, "Persentase digunakan"),
                  h("span", { style: { fontSize: 13, fontWeight: 500, color: "#A32D2D" } }, contUsage, "% = ฿", formatCurrency(c.contUsed))
                ),
                h("input", { type: "range", min: "0", max: "100", step: "5", value: contUsage, onChange: e => setContUsage(+e.target.value), style: { width: "100%" } }),
                h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 2 } },
                  h("span", null, "0% (semua jadi surplus)"),
                  h("span", null, "100% (habis semua)")
                )
              ),
              h("div", { style: { background: "#FCEBEB", borderRadius: "var(--border-radius-md)", padding: "8px 12px", fontSize: 12, color: "#A32D2D", marginTop: 10 } },
                h("div", null, "Terkumpul: ", c.totalPaying, " pax × ฿", contPP, " = ", h("b", null, "฿" + formatCurrency(c.contCollected))),
                h("div", { style: { marginTop: 3 } }, "Terpakai: ", h("b", null, "฿" + formatCurrency(c.contUsed)), "  |  Tidak terpakai: ", h("b", null, "฿" + formatCurrency(c.contUnused)))
              )
            )
          ),
          h("div", null,
            h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 12 } },
              h(MetricCard, { label: "Total peserta", value: c.totalPaying + " org", color: isDeficit ? "red" : "teal" }),
              h(MetricCard, { label: "Total pendapatan", value: "฿" + formatCurrency(c.revenue), color: "blue" }),
              h(MetricCard, { label: "Total pengeluaran", value: "฿" + formatCurrency(c.totalCost), color: "amber" })
            ),
            h(Section, { title: "Rincian pendapatan", accent: "green" },
              [
                { label: "Peserta Thailand 1 hari", qty: t1n, price: t1p, calc: `${t1n} × ฿${formatCurrency(t1p)}`, margin: `margin ฿${formatCurrency(c.margT1)}/org` },
                { label: "Peserta Thailand 2 hari", qty: t2n, price: t2p, calc: `${t2n} × ฿${formatCurrency(t2p)}`, margin: `margin ฿${formatCurrency(c.margT2)}/org` },
                { label: "Peserta Thailand 3 hari", qty: t3n, price: t3p, calc: `${t3n} × ฿${formatCurrency(t3p)}`, margin: `margin ฿${formatCurrency(c.margT3)}/org` },
                { label: "Peserta non-Thailand", qty: yn, price: yp, calc: `${yn} × ฿${formatCurrency(yp)}`, margin: `margin ฿${formatCurrency(c.margY)}/org` },
                { label: "Panitia Thailand", qty: pthn, price: pthp, calc: `${pthn} × ฿${formatCurrency(pthp)}`, margin: `margin ฿${formatCurrency(c.margPth)}/org` },
                { label: "Panitia non-Thailand", qty: pnonn, price: pnonp, calc: `${pnonn} × ฿${formatCurrency(pnonp)}`, margin: `margin ฿${Math.round(c.avgMargPnon)}/org` }
              ].map(({ label, calc, margin }) =>
                h("div", { key: label, style: { marginBottom: 12, paddingBottom: 12, borderBottom: "0.5px solid var(--color-border-tertiary)" } },
                  h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13, fontWeight: 500, color: "var(--color-text-primary)" } },
                    h("span", null, label),
                    h("span", null, "฿" + formatCurrency(label === "Peserta Thailand 1 hari" ? c.revT1 : label === "Peserta Thailand 2 hari" ? c.revT2 : label === "Peserta Thailand 3 hari" ? c.revT3 : label === "Peserta non-Thailand" ? c.revY : label === "Panitia Thailand" ? c.revPth : c.revPnon))
                  ),
                  h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 2 } }, calc),
                  h("div", { style: { fontSize: 11, color: "var(--color-text-secondary)", marginTop: 2 } }, margin)
                )
              ),
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 14, fontWeight: 500, padding: "8px 0", color: "#3B6D11" } },
                h("span", null, "Total pendapatan"),
                h("span", null, "฿" + formatCurrency(c.revenue))
              )
            ),
            h(Section, { title: "Rincian pengeluaran", accent: "red" },
              [
                { label: "Makan & souvenir — Peserta Thai non-panitia 1 hari", calc: `${t1n} × ฿${formatCurrency(t1c)}`, value: c.opsMT1 },
                { label: "Makan & souvenir — Peserta Thai non-panitia 2 hari", calc: `${t2n} × ฿${formatCurrency(t2c)}`, value: c.opsMT2 },
                { label: "Makan & souvenir — Peserta Thai non-panitia 3 hari", calc: `${t3n} × ฿${formatCurrency(t3c)}`, value: c.opsMT3 },
                { label: "Makan & souvenir — Seluruh panitia hadir + peserta non-Thai (3 hari)", calc: `${c.pTotal + yn} × ฿${formatCurrency(t3c)}`, value: c.opsMFull },
                { label: "City tour (Seluruh peserta dan panitia yang ikut sampai hari ke 3)", calc: `${t3n + c.pTotal + yn} × ฿${formatCurrency(cityTour)}`, value: c.opsCT },
                { label: "Biaya venue (non-subsidi)", calc: `${c.venuePayers} pax × ฿${formatCurrency(kbriV)}`, value: c.biayaVenue },
                { label: "Hotel panitia", calc: `${c.rooms} kamar × ฿${formatCurrency(hotelPPN)} × ${hotelN} malam`, value: c.hotelCost },
                { label: "Souvenir khusus panitia", calc: `${souvN} × ฿${formatCurrency(souvP)}`, value: c.souvCost },
                { label: "Contingency digunakan", calc: `${contUsage}%`, value: c.contUsed }
              ].map(({ label, calc, value }) =>
                h("div", { key: label, style: { marginBottom: 12, paddingBottom: 12, borderBottom: "0.5px solid var(--color-border-tertiary)" } },
                  h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13, fontWeight: 500, color: "var(--color-text-primary)" } },
                    h("span", null, label),
                    h("span", null, "฿" + formatCurrency(value))
                  ),
                  h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 2 } }, calc)
                )
              ),
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 14, fontWeight: 500, padding: "8px 0", color: "#A32D2D" } },
                h("span", null, "Total pengeluaran"),
                h("span", null, "฿" + formatCurrency(c.totalCost))
              )
            ),
            h(Section, { title: "Analisis subsidi KBRI", accent: "amber" },
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, padding: "4px 0", borderBottom: "0.5px solid var(--color-border-tertiary)" } },
                h("span", null, "Kuota KBRI"),
                h("span", { style: { fontWeight: 500 } }, kbriQ + " pax")
              ),
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, padding: "4px 0", borderBottom: "0.5px solid var(--color-border-tertiary)" } },
                h("span", null, "Dipakai peserta Thailand non-panitia"),
                h("span", { style: { fontWeight: 500 } }, c.tTotal + " pax")
              ),
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, padding: "4px 0", borderBottom: "0.5px solid var(--color-border-tertiary)" } },
                h("span", null, "Dipakai panitia Thailand"),
                h("span", { style: { fontWeight: 500 } }, pthn + " pax")
              ),
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, padding: "4px 0", borderBottom: "0.5px solid var(--color-border-tertiary)" } },
                h("span", null, "Sisa untuk panitia non-Thailand"),
                h("span", { style: { fontWeight: 500 } }, c.pnonGratis + " pax")
              ),
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, padding: "4px 0", borderBottom: "0.5px solid var(--color-border-tertiary)", color: c.kuotaHangus > 0 ? "#A32D2D" : "#3B6D11" } },
                h("span", null, "Kuota hangus"),
                h("span", { style: { fontWeight: 500 } }, c.kuotaHangus + " pax")
              ),
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13, padding: "6px 0", fontWeight: 500, color: "#854F0B" } },
                h("span", null, "Total nilai subsidi"),
                h("span", null, "฿" + formatCurrency(c.subsidiTotal))
              )
            ),
            h(Section, { title: "Analisis titik impas (operational)", accent: "blue" },
              h("div", { style: { fontSize: 12, fontWeight: 500, color: "var(--color-text-primary)", marginBottom: 12 } }, "Margin kontribusi per orang (sebelum contingency)"),
              h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 12 } },
                [{ title: "Thai 1hr", val: c.margT1 }, { title: "Thai 2hr", val: c.margT2 }, { title: "Thai 3hr", val: c.margT3 }, { title: "Non-Thai", val: c.margY }, { title: "Pan. Thai", val: c.margPth }, { title: "Pan. non-Thai", val: Math.round(c.avgMargPnon) }].map(({ title, val }) =>
                  h("div", { key: title, style: { background: "#E6F1FB", borderRadius: "var(--border-radius-md)", padding: "10px 14px", textAlign: "center" } },
                    h("div", { style: { fontSize: 11, color: "#185FA5", marginBottom: 4 } }, title),
                    h("div", { style: { fontSize: 16, fontWeight: 500, color: "#0C447C" } }, "+ ฿" + formatCurrency(val))
                  )
                )
              )
            ),
            ...(isDeficit ? [h(Section, { title: `Untuk menutup defisit ฿${formatCurrency(c.totalSurplus)}:`, accent: "red" },
              h("div", { style: { fontSize: 12, color: "var(--color-text-secondary)" } },
                [
                  { label: "peserta non-Thailand", margin: c.margY },
                  { label: "peserta Thailand 3 hari", margin: c.margT3 },
                  { label: "peserta Thailand 1 hari", margin: c.margT1 }
                ].map(({ label, margin }) => {
                  const needed = Math.ceil(Math.abs(c.totalSurplus) / Math.max(1, margin));
                  return h("div", { key: label, style: { marginBottom: 8 } }, "Tambah minimal ", h("b", null, needed), " ", label);
                })
              )
            )] : []),
            h(Section, { title: "Ringkasan akhir", accent: isDeficit ? "red" : "green" },
              h("div", { style: { fontSize: 12, fontWeight: 500, color: "var(--color-text-primary)", marginBottom: 10, paddingBottom: 8, borderBottom: "0.5px solid var(--color-border-tertiary)" } }, "Total peserta hadir"),
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, padding: "4px 0" } },
                h("span", null, "Seluruhnya"),
                h("span", { style: { fontWeight: 500 } }, c.totalPaying + " orang")
              ),
              h("div", { style: { fontSize: 12, fontWeight: 500, color: "var(--color-text-primary)", marginTop: 10, marginBottom: 6 } }, "Thailand non-panitia"),
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, padding: "3px 0", marginLeft: 8 } },
                h("span", null, "Hadir day 1"),
                h("span", { style: { fontWeight: 500 } }, t1n + " orang")
              ),
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, padding: "3px 0", marginLeft: 8 } },
                h("span", null, "Hadir day 1-2"),
                h("span", { style: { fontWeight: 500 } }, t2n + " orang")
              ),
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, padding: "3px 0", marginLeft: 8, borderBottom: "0.5px solid var(--color-border-tertiary)", marginBottom: 8 } },
                h("span", null, "Hadir day 1-3"),
                h("span", { style: { fontWeight: 500 } }, t3n + " orang")
              ),
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, padding: "4px 0", borderBottom: "0.5px solid var(--color-border-tertiary)" } },
                h("span", null, "Non-Thailand"),
                h("span", { style: { fontWeight: 500 } }, yn + " orang")
              ),
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, padding: "4px 0", borderBottom: "0.5px solid var(--color-border-tertiary)", marginBottom: 8 } },
                h("span", null, "Panitia hadir"),
                h("span", { style: { fontWeight: 500 } }, c.pTotal + " orang")
              ),
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, padding: "4px 0", borderBottom: "0.5px solid var(--color-border-tertiary)", fontWeight: 500, color: "#3B6D11" } },
                h("span", null, "Total pendapatan"),
                h("span", null, "฿" + formatCurrency(c.revenue))
              ),
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, padding: "4px 0", borderBottom: "0.5px solid var(--color-border-tertiary)", fontWeight: 500, color: "#A32D2D", marginBottom: 10 } },
                h("span", null, "Total pengeluaran"),
                h("span", null, "฿" + formatCurrency(c.totalCost))
              ),
              (() => {
                const nilaiAkhir = c.revenue - c.totalCost;
                const isAkhirDeficit = nilaiAkhir < 0;
                return h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13, fontWeight: 500, padding: "10px 12px", borderRadius: "var(--border-radius-md)", background: isAkhirDeficit ? "#FCEBEB" : "#EAF3DE", color: isAkhirDeficit ? "#791F1F" : "#27500A" } },
                  h("span", null, "Nilai akhir " + (isAkhirDeficit ? "DEFISIT" : "SURPLUS")),
                  h("span", null, isAkhirDeficit ? "- ฿" + formatCurrency(nilaiAkhir) : "+ ฿" + formatCurrency(nilaiAkhir))
                );
              })()
            )
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
