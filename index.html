<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Anggaran Simposium - PPIDK Asia Oceania 2026</title>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
      --color-background-tertiary: #f6f7f8;
      --color-background-secondary: #f0f2f5;
      --color-background-primary: #ffffff;
      --color-border-tertiary: #e4e6eb;
      --color-text-primary: #050505;
      --color-text-secondary: #65676b;
      --color-text-tertiary: #8a8d91;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
    }

    input[type="number"],
    input[type="range"] {
      font-family: var(--font-sans);
    }

    input[type="number"] {
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      padding: 6px 8px;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #378ADD;
      box-shadow: 0 0 0 2px rgba(55, 138, 221, 0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 4px;
    }

    #root {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" src="Calculator.js"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
