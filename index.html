<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Anggaran Simposium - PPIDK Asia Oceania 2026</title>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
      --color-background-tertiary: #f6f7f8;
      --color-background-secondary: #f0f2f5;
      --color-background-primary: #ffffff;
      --color-border-tertiary: #e4e6eb;
      --color-text-primary: #050505;
      --color-text-secondary: #65676b;
      --color-text-tertiary: #8a8d91;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: var(--color-background-tertiary); color: var(--color-text-primary); }
    input[type="number"] { border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 6px 8px; font-family: var(--font-sans); }
    input[type="number"]:focus { outline: none; border-color: #378ADD; box-shadow: 0 0 0 2px rgba(55, 138, 221, 0.1); }
    input[type="text"] { border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 6px 8px; font-family: var(--font-sans); }
    input[type="text"]:focus { outline: none; border-color: #378ADD; box-shadow: 0 0 0 2px rgba(55, 138, 221, 0.1); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 4px; }
    #root { display: flex; flex-direction: column; min-height: 100vh; }

    @media (max-width: 768px) {
      body { padding: 0 8px; }
      input[type="number"] { padding: 6px 4px; font-size: 13px; }
      [style*="padding: 16px 20px"][style*="grid"] { grid-template-columns: 1fr !important; gap: 12px !important; }
      [style*="alignItems: flex-end"] { grid-template-columns: 70px 90px 90px !important; gap: 8px !important; }
      [style*="display: flex"][style*="gap"] { flex-direction: column; }
    }

    @media (max-width: 480px) {
      body { padding: 0 4px; }
      input[type="number"] { padding: 6px 3px; font-size: 12px; }
      [style*="padding: 16px 20px"][style*="grid"] { grid-template-columns: 1fr !important; gap: 8px !important; }
      [style*="alignItems: flex-end"] { grid-template-columns: 60px 80px 80px !important; gap: 6px !important; }
      [style*="fontSize: 16"] { font-size: 14px !important; }
      [style*="fontSize: 14"] { font-size: 13px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    const { useState, useMemo, useEffect } = React;
    const h = React.createElement;
    const formatCurrency = (n) => Math.round(Math.abs(n)).toLocaleString("id-ID");

    function Field({ label, value, onChange, suffix = "Baht", small }) {
      return h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 } },
        h("label", { style: { fontSize: small ? 12 : 13, color: "var(--color-text-secondary)", flex: 1 } }, label),
        h("div", { style: { display: "flex", alignItems: "center", gap: 4 } },
          h("input", { type: "number", min: "0", value, onChange: e => onChange(Math.max(0, Number(e.target.value) || 0)), style: { width: 80, textAlign: "right", fontSize: 13 } }),
          h("span", { style: { fontSize: 11, color: "var(--color-text-tertiary)", width: 30 } }, suffix)
        )
      );
    }

    function Section({ title, accent, children }) {
      const accentColors = { blue: { bg: "#E6F1FB", border: "#378ADD", text: "#0C447C" }, green: { bg: "#EAF3DE", border: "#639922", text: "#3B6D11" }, amber: { bg: "#FAEEDA", border: "#BA7517", text: "#854F0B" }, teal: { bg: "#E1F5EE", border: "#1D9E75", text: "#0F6E56" }, pink: { bg: "#FBEAF0", border: "#D4537E", text: "#993556" }, red: { bg: "#FCEBEB", border: "#E24B4A", text: "#A32D2D" }, purple: { bg: "#EEEDFE", border: "#7F77DD", text: "#3C3489" } };
      const color = accentColors[accent] || accentColors.blue;
      return h("div", { style: { background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: "var(--border-radius-lg)", marginBottom: 12, overflow: "hidden" } },
        h("div", { style: { background: color.bg, borderBottom: `0.5px solid ${color.border}`, padding: "8px 14px", fontSize: 13, fontWeight: 500, color: color.text } }, title),
        h("div", { style: { padding: "12px 14px" } }, children)
      );
    }

    function MetricCard({ label, value, color }) {
      const cardColors = { green: { bg: "#EAF3DE", text: "#3B6D11", val: "#27500A" }, red: { bg: "#FCEBEB", text: "#A32D2D", val: "#791F1F" }, blue: { bg: "#E6F1FB", text: "#185FA5", val: "#0C447C" }, amber: { bg: "#FAEEDA", text: "#854F0B", val: "#633806" }, teal: { bg: "#E1F5EE", text: "#0F6E56", val: "#085041" } };
      const cardColor = cardColors[color] || cardColors.blue;
      return h("div", { style: { background: cardColor.bg, borderRadius: "var(--border-radius-md)", padding: "10px 14px", textAlign: "center" } },
        h("div", { style: { fontSize: 11, color: cardColor.text, marginBottom: 4 } }, label),
        h("div", { style: { fontSize: 20, fontWeight: 500, color: cardColor.val } }, value)
      );
    }

    function App() {
      // INCOME: Registration
      const [t1n, setT1n] = useState(20); const [t1p, setT1p] = useState(1000);
      const [t2n, setT2n] = useState(5); const [t2p, setT2p] = useState(1400);
      const [t3n, setT3n] = useState(5); const [t3p, setT3p] = useState(3150);
      const [yn, setYn] = useState(20); const [yp, setYp] = useState(4000);
      const [pthn, setPthn] = useState(17); const [pthp, setPthp] = useState(4000);
      const [pnonn, setPnonn] = useState(23); const [pnonp, setPnonp] = useState(4000);

      // INCOME: Other sources
      const [ppidk, setPpidk] = useState(0); const [sponsor, setSponsor] = useState(0);
      const [customIncomes, setCustomIncomes] = useState([]);

      // INCOME: KBRI
      const [kbriQ, setKbriQ] = useState(70); const [kbriV, setKbriV] = useState(850);

      // EXPENSES: Contingency (% of revenue)
      const [contingencyPct, setContingencyPct] = useState(0);

      // EXPENSES: Consumption per day (Thai breakdown by duration)
      const [t1c, setT1c] = useState(400); const [t2c, setT2c] = useState(800); const [t3c, setT3c] = useState(1200);

      // EXPENSES: Consumption non-Thai & panitia (3 days)
      const [c3, setC3] = useState(1200);

      // EXPENSES: Venue
      const [venuePerPax, setVenuePerPax] = useState(850);

      // EXPENSES: City Tour
      const [ctTransport, setCtTransport] = useState(300);
      const [ctTemple, setCtTemple] = useState(200);
      const [ctDinnerCruise, setCtDinnerCruise] = useState(850);
      const [ctHeadcount, setCtHeadcount] = useState(30);

      // EXPENSES: Seminar Kit
      const [semKitP, setSemKitP] = useState(400);
      const [semKitN, setSemKitN] = useState(44);

      // EXPENSES: Custom
      const [customExpenses, setCustomExpenses] = useState([]);

      // KEUNTUNGAN KHUSUS: Now fully customizable
      const [keuntunganItems, setKeuntunganItems] = useState([
        { desc: "Hotel", qty: 20, price: 700, total: 14000 },
        { desc: "Souvenir Khusus", qty: 44, price: 400, total: 17600 }
      ]);

      // PROFIT SPLIT
      const [ppidk_perm_split, setPpidk_perm_split] = useState(30);

      // Main calculations
      const calc = useMemo(() => {
        // Participants totals
        const tTotal = t1n + t2n + t3n;
        const pTotal = pthn + pnonn;
        const totalPaying = tTotal + yn + pTotal;

        // KBRI subsidy logic
        const usedByThai = tTotal + pthn;
        const sisaKuota = Math.max(0, kbriQ - usedByThai);
        const pnonGratis = Math.min(pnonn, sisaKuota);
        const pnonBayarVenue = pnonn - pnonGratis;
        const venuePayers = pnonBayarVenue + yn;
        const subsidiTotal = (usedByThai + pnonGratis) * kbriV;

        // INCOME: Registration
        const revT1 = t1n * t1p, revT2 = t2n * t2p, revT3 = t3n * t3p;
        const revY = yn * yp, revPth = pthn * pthp, revPnon = pnonn * pnonp;
        const regRevenue = revT1 + revT2 + revT3 + revY + revPth + revPnon;

        // INCOME: Total (before KBRI & custom)
        const totalIncomeBeforeKbri = regRevenue + ppidk + sponsor + (customIncomes.reduce((s, c) => s + c.total, 0) || 0);

        // INCOME: KBRI subsidy
        const totalIncome = totalIncomeBeforeKbri + subsidiTotal;

        // EXPENSES: Contingency (% of total income)
        const contingencyExp = totalIncome * (contingencyPct / 100);

        // EXPENSES: Consumption
        const expT1 = t1n * t1c, expT2 = t2n * t2c, expT3 = t3n * t3c;
        const expYearN = yn * c3, expPan = pTotal * c3;
        const consumptionTotal = expT1 + expT2 + expT3 + expYearN + expPan;

        // EXPENSES: Venue
        const venueExp = venuePayers * venuePerPax;

        // EXPENSES: City tour
        const cityTourTotal = (ctTransport + ctTemple + ctDinnerCruise) * ctHeadcount;

        // EXPENSES: Seminar Kit
        const semKitTotal = semKitN * semKitP;

        // EXPENSES: Custom
        const customExpTotal = customExpenses.reduce((s, c) => s + c.total, 0) || 0;

        // TOTAL EXPENSES
        const totalExpenses = consumptionTotal + venueExp + cityTourTotal + semKitTotal + customExpTotal + contingencyExp;

        // NILAI AKHIR
        const nilaiAkhir = totalIncome - totalExpenses;

        // KEUNTUNGAN KHUSUS PANITIA: Sum of all customizable items
        const totalKeuntungan = keuntunganItems.reduce((s, c) => s + c.total, 0) || 0;

        // SISA SURPLUS
        const sisaSurplus = nilaiAkhir - totalKeuntungan;

        return {
          tTotal, pTotal, totalPaying, usedByThai, sisaKuota, pnonGratis, pnonBayarVenue, venuePayers, subsidiTotal,
          revT1, revT2, revT3, revY, revPth, revPnon, regRevenue, totalIncomeBeforeKbri, totalIncome,
          expT1, expT2, expT3, expYearN, expPan, consumptionTotal, venueExp, cityTourTotal, semKitTotal, customExpTotal, contingencyExp,
          totalExpenses, nilaiAkhir, totalKeuntungan, sisaSurplus
        };
      }, [t1n,t1p,t2n,t2p,t3n,t3p,yn,yp,pthn,pthp,pnonn,pnonp,ppidk,sponsor,customIncomes,kbriQ,kbriV,t1c,t2c,t3c,c3,venuePerPax,ctTransport,ctTemple,ctDinnerCruise,ctHeadcount,semKitP,semKitN,customExpenses,contingencyPct,keuntunganItems,ppidk_perm_split]);

      const isDeficit = calc.nilaiAkhir < 0;
      const isSisaDeficit = calc.sisaSurplus < 0;

      return h("div", { style: { fontFamily: "var(--font-sans)", background: "var(--color-background-tertiary)", minHeight: "100vh" } },
        h("div", { style: { background: "var(--color-background-primary)", borderBottom: "0.5px solid var(--color-border-tertiary)", padding: "12px 20px" } },
          h("div", { style: { fontSize: 16, fontWeight: 500, color: "var(--color-text-primary)" } }, "Kalkulator Anggaran Simposium"),
          h("div", { style: { fontSize: 12, color: "var(--color-text-tertiary)" } }, "PPIDK Asia Oceania 2026 · PERMITHA · semua nilai dapat diubah")
        ),
        h("div", { style: { padding: "16px 20px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 } },
          // LEFT COLUMN: INPUTS
          h("div", null,
            // PENDAPATAN
            h(Section, { title: "PENDAPATAN", accent: "green" },
              h("div", { style: { fontSize: 12, fontWeight: 500, marginBottom: 10, color: "var(--color-text-primary)" } }, "1. PPIDK Support"),
              h("input", { type: "number", min: "0", value: ppidk, onChange: e => setPpidk(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 12, marginBottom: 12, padding: "6px 8px" } }),

              h("div", { style: { fontSize: 12, fontWeight: 500, marginBottom: 10, color: "var(--color-text-primary)" } }, "2. Sponsor"),
              h("input", { type: "number", min: "0", value: sponsor, onChange: e => setSponsor(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 12, marginBottom: 12, padding: "6px 8px" } }),

              h("div", { style: { fontSize: 12, fontWeight: 500, marginBottom: 10, color: "var(--color-text-primary)" } }, "3. KBRI (Subsidi Venue)"),
              h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 6 } }, "Kuota: ", calc.usedByThai + calc.pnonGratis, " pax × ฿", formatCurrency(kbriV), " = ฿", formatCurrency(calc.subsidiTotal)),
              h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 } },
                h("div", null,
                  h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 4 } }, "Kuota"),
                  h("input", { type: "number", min: "0", value: kbriQ, onChange: e => setKbriQ(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 12 } })
                ),
                h("div", null,
                  h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 4 } }, "Nilai/pax"),
                  h("input", { type: "number", min: "0", value: kbriV, onChange: e => setKbriV(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 12 } })
                )
              ),

              h("div", { style: { fontSize: 12, fontWeight: 500, marginBottom: 10, color: "var(--color-text-primary)" } }, "4. Pendaftaran Peserta"),
              h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 8 } }, "Thailand non-panitia"),
              h("div", { style: { display: "grid", gridTemplateColumns: "80px 1fr 1fr", gap: 8, marginBottom: 8, fontSize: 11, alignItems: "flex-end" } },
                h("div", { style: { color: "var(--color-text-tertiary)" } }, "Durasi"),
                h("div", { style: { color: "var(--color-text-tertiary)" } }, "Jumlah"),
                h("div", { style: { color: "var(--color-text-tertiary)" } }, "Harga"),
                h("div", null, "1 hari"),
                h("input", { type: "number", min: "0", value: t1n, onChange: e => setT1n(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11 } }),
                h("input", { type: "number", min: "0", value: t1p, onChange: e => setT1p(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11 } }),
                h("div", null, "2 hari"),
                h("input", { type: "number", min: "0", value: t2n, onChange: e => setT2n(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11 } }),
                h("input", { type: "number", min: "0", value: t2p, onChange: e => setT2p(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11 } }),
                h("div", null, "3 hari"),
                h("input", { type: "number", min: "0", value: t3n, onChange: e => setT3n(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11 } }),
                h("input", { type: "number", min: "0", value: t3p, onChange: e => setT3p(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11 } })
              ),
              h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 8 } }, "Non-Thailand"),
              h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 } },
                h("input", { type: "number", min: "0", value: yn, onChange: e => setYn(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11, padding: "4px 6px" } }),
                h("input", { type: "number", min: "0", value: yp, onChange: e => setYp(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11, padding: "4px 6px" } })
              ),
              h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 8 } }, "Panitia Thailand"),
              h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 } },
                h("input", { type: "number", min: "0", value: pthn, onChange: e => setPthn(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11, padding: "4px 6px" } }),
                h("input", { type: "number", min: "0", value: pthp, onChange: e => setPthp(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11, padding: "4px 6px" } })
              ),
              h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 8 } }, "Panitia Non-Thailand"),
              h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 } },
                h("input", { type: "number", min: "0", value: pnonn, onChange: e => setPnonn(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11, padding: "4px 6px" } }),
                h("input", { type: "number", min: "0", value: pnonp, onChange: e => setPnonp(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11, padding: "4px 6px" } })
              ),

              h("div", { style: { fontSize: 12, fontWeight: 500, marginBottom: 10, color: "var(--color-text-primary)" } }, "5. Biaya Tambahan (+)"),
              customIncomes.map((c, i) =>
                h("div", { key: i, style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr 40px", gap: 6, marginBottom: 6, alignItems: "flex-end" } },
                  h("input", { type: "text", placeholder: "Deskripsi", value: c.desc, onChange: e => { const nc = [...customIncomes]; nc[i].desc = e.target.value; setCustomIncomes(nc); }, style: { fontSize: 11, padding: "4px 6px" } }),
                  h("input", { type: "number", min: "0", placeholder: "Qty", value: c.qty, onChange: e => { const nc = [...customIncomes]; nc[i].qty = +e.target.value || 0; nc[i].total = nc[i].qty * nc[i].price; setCustomIncomes(nc); }, style: { fontSize: 11, padding: "4px 6px", textAlign: "right" } }),
                  h("input", { type: "number", min: "0", placeholder: "Price", value: c.price, onChange: e => { const nc = [...customIncomes]; nc[i].price = +e.target.value || 0; nc[i].total = nc[i].qty * nc[i].price; setCustomIncomes(nc); }, style: { fontSize: 11, padding: "4px 6px", textAlign: "right" } }),
                  h("button", { onClick: () => setCustomIncomes(customIncomes.filter((_, j) => j !== i)), style: { width: 40, height: 26, border: "1px solid var(--color-border-tertiary)", background: "white", borderRadius: 4, cursor: "pointer", fontSize: 12 } }, "×")
                )
              ),
              h("button", { onClick: () => setCustomIncomes([...customIncomes, { desc: "", qty: 0, price: 0, total: 0 }]), style: { width: "100%", padding: "6px", fontSize: 11, border: "1px solid var(--color-border-tertiary)", background: "var(--color-background-secondary)", borderRadius: 4, cursor: "pointer" } }, "+ Tambah biaya")
            ),

            // PENGELUARAN
            h(Section, { title: "PENGELUARAN", accent: "red" },
              h("div", { style: { fontSize: 12, fontWeight: 500, marginBottom: 10, color: "var(--color-text-primary)" } }, "1. Konsumsi Per Hari"),
              h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 8 } }, "Thailand non-panitia"),
              h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 8 } },
                h("div", null,
                  h("div", { style: { fontSize: 10, color: "var(--color-text-tertiary)", marginBottom: 2 } }, "Hari 1"),
                  h("input", { type: "number", min: "0", value: t1c, onChange: e => setT1c(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11 } })
                ),
                h("div", null,
                  h("div", { style: { fontSize: 10, color: "var(--color-text-tertiary)", marginBottom: 2 } }, "Hari 1-2"),
                  h("input", { type: "number", min: "0", value: t2c, onChange: e => setT2c(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11 } })
                ),
                h("div", null,
                  h("div", { style: { fontSize: 10, color: "var(--color-text-tertiary)", marginBottom: 2 } }, "Hari 1-3"),
                  h("input", { type: "number", min: "0", value: t3c, onChange: e => setT3c(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11 } })
                )
              ),
              h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 8 } }, "Non-Thailand & Panitia (3 hari)"),
              h("input", { type: "number", min: "0", value: c3, onChange: e => setC3(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11, marginBottom: 12, padding: "4px 6px" } }),

              h("div", { style: { fontSize: 12, fontWeight: 500, marginBottom: 10, color: "var(--color-text-primary)" } }, "2. Seminar Kit"),
              h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 } },
                h("div", null,
                  h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 4 } }, "Harga/orang"),
                  h("input", { type: "number", min: "0", value: semKitP, onChange: e => setSemKitP(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11 } })
                ),
                h("div", null,
                  h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 4 } }, "Jumlah"),
                  h("input", { type: "number", min: "0", value: semKitN, onChange: e => setSemKitN(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11 } })
                )
              ),

              h("div", { style: { fontSize: 12, fontWeight: 500, marginBottom: 10, color: "var(--color-text-primary)" } }, "3. Venue"),
              h("input", { type: "number", min: "0", value: venuePerPax, onChange: e => setVenuePerPax(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11, marginBottom: 12, padding: "4px 6px" } }),

              h("div", { style: { fontSize: 12, fontWeight: 500, marginBottom: 10, color: "var(--color-text-primary)" } }, "4. City Tour"),
              h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 8 } },
                h("div", null,
                  h("div", { style: { fontSize: 10, color: "var(--color-text-tertiary)", marginBottom: 2 } }, "Transport"),
                  h("input", { type: "number", min: "0", value: ctTransport, onChange: e => setCtTransport(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11 } })
                ),
                h("div", null,
                  h("div", { style: { fontSize: 10, color: "var(--color-text-tertiary)", marginBottom: 2 } }, "Temple"),
                  h("input", { type: "number", min: "0", value: ctTemple, onChange: e => setCtTemple(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11 } })
                ),
                h("div", null,
                  h("div", { style: { fontSize: 10, color: "var(--color-text-tertiary)", marginBottom: 2 } }, "Dinner Cruise"),
                  h("input", { type: "number", min: "0", value: ctDinnerCruise, onChange: e => setCtDinnerCruise(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11 } })
                )
              ),
              h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 8 } }, "Jumlah orang ikut"),
              h("input", { type: "number", min: "0", value: ctHeadcount, onChange: e => setCtHeadcount(Math.max(0, +e.target.value || 0)), style: { width: "100%", textAlign: "right", fontSize: 11, marginBottom: 12, padding: "4px 6px" } }),

              h("div", { style: { fontSize: 12, fontWeight: 500, marginBottom: 10, color: "var(--color-text-primary)" } }, "5. Biaya Darurat (%)"),
              h("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 12 } },
                h("input", { type: "number", min: "0", max: "100", value: contingencyPct, onChange: e => setContingencyPct(+e.target.value || 0), style: { width: 80, textAlign: "right", fontSize: 11 } }),
                h("input", { type: "range", min: "0", max: "100", step: "1", value: contingencyPct, onChange: e => setContingencyPct(+e.target.value), style: { flex: 1 } }),
                h("span", { style: { fontSize: 11, color: "var(--color-text-secondary)" } }, contingencyPct + "%")
              ),

              h("div", { style: { fontSize: 12, fontWeight: 500, marginBottom: 10, color: "var(--color-text-primary)" } }, "6. Pengeluaran Tambahan (+)"),
              customExpenses.map((c, i) =>
                h("div", { key: i, style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr 40px", gap: 6, marginBottom: 6, alignItems: "flex-end" } },
                  h("input", { type: "text", placeholder: "Deskripsi", value: c.desc, onChange: e => { const nc = [...customExpenses]; nc[i].desc = e.target.value; setCustomExpenses(nc); }, style: { fontSize: 11, padding: "4px 6px" } }),
                  h("input", { type: "number", min: "0", placeholder: "Qty", value: c.qty, onChange: e => { const nc = [...customExpenses]; nc[i].qty = +e.target.value || 0; nc[i].total = nc[i].qty * nc[i].price; setCustomExpenses(nc); }, style: { fontSize: 11, padding: "4px 6px", textAlign: "right" } }),
                  h("input", { type: "number", min: "0", placeholder: "Price", value: c.price, onChange: e => { const nc = [...customExpenses]; nc[i].price = +e.target.value || 0; nc[i].total = nc[i].qty * nc[i].price; setCustomExpenses(nc); }, style: { fontSize: 11, padding: "4px 6px", textAlign: "right" } }),
                  h("button", { onClick: () => setCustomExpenses(customExpenses.filter((_, j) => j !== i)), style: { width: 40, height: 26, border: "1px solid var(--color-border-tertiary)", background: "white", borderRadius: 4, cursor: "pointer", fontSize: 12 } }, "×")
                )
              ),
              h("button", { onClick: () => setCustomExpenses([...customExpenses, { desc: "", qty: 0, price: 0, total: 0 }]), style: { width: "100%", padding: "6px", fontSize: 11, border: "1px solid var(--color-border-tertiary)", background: "var(--color-background-secondary)", borderRadius: 4, cursor: "pointer" } }, "+ Tambah pengeluaran")
            )
          ),

          // RIGHT COLUMN: SUMMARY
          h("div", null,
            // Top metrics
            h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 12 } },
              h(MetricCard, { label: "Total peserta", value: calc.totalPaying + " org", color: isDeficit ? "red" : "teal" }),
              h(MetricCard, { label: "Total pendapatan", value: "฿" + formatCurrency(calc.totalIncome), color: "blue" }),
              h(MetricCard, { label: "Total pengeluaran", value: "฿" + formatCurrency(calc.totalExpenses), color: "amber" })
            ),

            // Rincian Pendapatan
            h(Section, { title: "Rincian Pendapatan", accent: "green" },
              h("div", { style: { fontSize: 12, display: "flex", justifyContent: "space-between", paddingBottom: 8, borderBottom: "0.5px solid var(--color-border-tertiary)", marginBottom: 8 } },
                h("span", null, "Pendaftaran: "),
                h("span", { style: { fontWeight: 500 } }, "฿" + formatCurrency(calc.regRevenue))
              ),
              h("div", { style: { fontSize: 11, color: "var(--color-text-secondary)", marginLeft: 8, marginBottom: 8 } },
                h("div", null, "Thai 1hr: ", t1n, " × ฿", formatCurrency(t1p), " = ฿", formatCurrency(calc.revT1)),
                h("div", null, "Thai 2hr: ", t2n, " × ฿", formatCurrency(t2p), " = ฿", formatCurrency(calc.revT2)),
                h("div", null, "Thai 3hr: ", t3n, " × ฿", formatCurrency(t3p), " = ฿", formatCurrency(calc.revT3)),
                h("div", null, "Non-Thai: ", yn, " × ฿", formatCurrency(yp), " = ฿", formatCurrency(calc.revY)),
                h("div", null, "Pan. Thai: ", pthn, " × ฿", formatCurrency(pthp), " = ฿", formatCurrency(calc.revPth)),
                h("div", null, "Pan. Non-Thai: ", pnonn, " × ฿", formatCurrency(pnonp), " = ฿", formatCurrency(calc.revPnon))
              ),
              ppidk > 0 ? h("div", { style: { fontSize: 12, display: "flex", justifyContent: "space-between", paddingBottom: 8, borderBottom: "0.5px solid var(--color-border-tertiary)", marginBottom: 8 } },
                h("span", null, "PPIDK: "),
                h("span", { style: { fontWeight: 500 } }, "฿" + formatCurrency(ppidk))
              ) : null,
              sponsor > 0 ? h("div", { style: { fontSize: 12, display: "flex", justifyContent: "space-between", paddingBottom: 8, borderBottom: "0.5px solid var(--color-border-tertiary)", marginBottom: 8 } },
                h("span", null, "Sponsor: "),
                h("span", { style: { fontWeight: 500 } }, "฿" + formatCurrency(sponsor))
              ) : null,
              h("div", { style: { fontSize: 12, display: "flex", justifyContent: "space-between", paddingBottom: 8, borderBottom: "0.5px solid var(--color-border-tertiary)", marginBottom: 8 } },
                h("span", null, "KBRI Subsidi: "),
                h("span", { style: { fontWeight: 500 } }, "฿" + formatCurrency(calc.subsidiTotal))
              ),
              h("div", { style: { fontSize: 11, color: "var(--color-text-secondary)", marginLeft: 8, marginBottom: 8 } },
                h("div", null, "Thai: ", calc.usedByThai, " pax"),
                h("div", null, "Pan. Non-Thai: ", calc.pnonGratis, " pax (gratis)")
              ),
              customIncomes.length > 0 ? customIncomes.map((c, i) =>
                h("div", { key: i, style: { fontSize: 12, display: "flex", justifyContent: "space-between", paddingBottom: 8, borderBottom: "0.5px solid var(--color-border-tertiary)", marginBottom: 8 } },
                  h("span", null, c.desc),
                  h("span", { style: { fontWeight: 500 } }, "฿" + formatCurrency(c.total))
                )
              ) : null
            ),

            // Rincian Pengeluaran
            h(Section, { title: "Rincian Pengeluaran", accent: "red" },
              h("div", { style: { fontSize: 12, display: "flex", justifyContent: "space-between", paddingBottom: 8, borderBottom: "0.5px solid var(--color-border-tertiary)", marginBottom: 8 } },
                h("span", null, "Konsumsi: "),
                h("span", { style: { fontWeight: 500 } }, "฿" + formatCurrency(calc.consumptionTotal))
              ),
              h("div", { style: { fontSize: 11, color: "var(--color-text-secondary)", marginLeft: 8, marginBottom: 8 } },
                h("div", null, "Thai 1hr: ", t1n, " × ฿", formatCurrency(t1c), " = ฿", formatCurrency(calc.expT1)),
                h("div", null, "Thai 2hr: ", t2n, " × ฿", formatCurrency(t2c), " = ฿", formatCurrency(calc.expT2)),
                h("div", null, "Thai 3hr: ", t3n, " × ฿", formatCurrency(t3c), " = ฿", formatCurrency(calc.expT3)),
                h("div", null, "Non-Thai: ", yn, " × ฿", formatCurrency(c3), " = ฿", formatCurrency(calc.expYearN)),
                h("div", null, "Panitia: ", calc.pTotal, " × ฿", formatCurrency(c3), " = ฿", formatCurrency(calc.expPan))
              ),
              h("div", { style: { fontSize: 12, display: "flex", justifyContent: "space-between", paddingBottom: 8, borderBottom: "0.5px solid var(--color-border-tertiary)", marginBottom: 8 } },
                h("span", null, "Venue: "),
                h("span", { style: { fontWeight: 500 } }, "฿" + formatCurrency(calc.venueExp))
              ),
              h("div", { style: { fontSize: 11, color: "var(--color-text-secondary)", marginLeft: 8, marginBottom: 8 } },
                h("div", null, "Pembayar: ", calc.venuePayers, " pax × ฿", formatCurrency(venuePerPax), " = ฿", formatCurrency(calc.venueExp))
              ),
              h("div", { style: { fontSize: 12, display: "flex", justifyContent: "space-between", paddingBottom: 8, borderBottom: "0.5px solid var(--color-border-tertiary)", marginBottom: 8 } },
                h("span", null, "City Tour: "),
                h("span", { style: { fontWeight: 500 } }, "฿" + formatCurrency(calc.cityTourTotal))
              ),
              h("div", { style: { fontSize: 11, color: "var(--color-text-secondary)", marginLeft: 8, marginBottom: 8 } },
                h("div", null, "(", ctTransport, " + ", ctTemple, " + ", ctDinnerCruise, ") × ", ctHeadcount, " = ฿", formatCurrency(calc.cityTourTotal))
              ),
              h("div", { style: { fontSize: 12, display: "flex", justifyContent: "space-between", paddingBottom: 8, borderBottom: "0.5px solid var(--color-border-tertiary)", marginBottom: 8 } },
                h("span", null, "Seminar Kit: "),
                h("span", { style: { fontWeight: 500 } }, "฿" + formatCurrency(calc.semKitTotal))
              ),
              h("div", { style: { fontSize: 11, color: "var(--color-text-secondary)", marginLeft: 8, marginBottom: 8 } },
                h("div", null, semKitN, " × ฿", formatCurrency(semKitP), " = ฿", formatCurrency(calc.semKitTotal))
              ),
              calc.contingencyExp > 0 ? h("div", { style: { fontSize: 12, display: "flex", justifyContent: "space-between", paddingBottom: 8, borderBottom: "0.5px solid var(--color-border-tertiary)", marginBottom: 8 } },
                h("span", null, "Biaya Darurat: "),
                h("span", { style: { fontWeight: 500 } }, "฿" + formatCurrency(calc.contingencyExp))
              ) : null,
              calc.contingencyExp > 0 ? h("div", { style: { fontSize: 11, color: "var(--color-text-secondary)", marginLeft: 8, marginBottom: 8 } },
                h("div", null, "฿", formatCurrency(calc.totalIncome), " × ", contingencyPct, "% = ฿", formatCurrency(calc.contingencyExp))
              ) : null,
              customExpenses.length > 0 ? customExpenses.map((c, i) =>
                h("div", { key: i, style: { fontSize: 12, display: "flex", justifyContent: "space-between", paddingBottom: 8, borderBottom: "0.5px solid var(--color-border-tertiary)", marginBottom: 8 } },
                  h("span", null, c.desc),
                  h("span", { style: { fontWeight: 500 } }, "฿" + formatCurrency(c.total))
                )
              ) : null
            ),

            // Ringkasan Akhir (always shows)
            h(Section, { title: "Ringkasan Akhir", accent: "green" },
              h("div", { style: { fontSize: 12, fontWeight: 500, marginBottom: 10 } }, "Total Peserta: ", calc.totalPaying, " orang"),
              h("div", { style: { fontSize: 12, fontWeight: 500, marginBottom: 10 } }, "Total Pendapatan: ฿", formatCurrency(calc.totalIncome)),
              h("div", { style: { fontSize: 12, fontWeight: 500, marginBottom: 10 } }, "Total Pengeluaran: ฿", formatCurrency(calc.totalExpenses)),
              h("div", { style: { fontSize: 12, fontWeight: 500 } }, "Nilai Akhir: ฿" + (calc.nilaiAkhir >= 0 ? "+" : "-") + formatCurrency(calc.nilaiAkhir))
            ),

            // Nilai Akhir badge (always shows)
            (() => {
              return h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13, fontWeight: 500, padding: "10px 12px", borderRadius: "var(--border-radius-md)", background: isDeficit ? "#FCEBEB" : "#EAF3DE", color: isDeficit ? "#791F1F" : "#27500A", marginBottom: 12 } },
                h("span", null, "Nilai Akhir " + (isDeficit ? "DEFISIT" : "SURPLUS")),
                h("span", null, isDeficit ? "- ฿" + formatCurrency(calc.nilaiAkhir) : "+ ฿" + formatCurrency(calc.nilaiAkhir))
              );
            })(),

            // Alokasi Surplus section (only if not deficit)
            isDeficit ? null : h("div", null,
              h("div", { style: { fontSize: 13, fontWeight: 500, padding: "8px 14px", background: "#EEEDFE", borderBottom: "0.5px solid #7F77DD", marginBottom: 12, borderRadius: "var(--border-radius-md)", color: "#3C3489" } }, "Alokasi Surplus"),

              // Keuntungan Khusus Panitia (fully customizable)
              h(Section, { title: "Keuntungan Khusus Panitia", accent: "pink" },
                keuntunganItems.map((item, i) =>
                  h("div", { key: i, style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 40px", gap: 6, marginBottom: 8, alignItems: "flex-end" } },
                    h("input", { type: "text", placeholder: "Deskripsi", value: item.desc, onChange: e => { const ni = [...keuntunganItems]; ni[i].desc = e.target.value; setKeuntunganItems(ni); }, style: { fontSize: 11, padding: "4px 6px" } }),
                    h("input", { type: "number", min: "0", placeholder: "Qty", value: item.qty, onChange: e => { const ni = [...keuntunganItems]; ni[i].qty = +e.target.value || 0; ni[i].total = ni[i].qty * ni[i].price; setKeuntunganItems(ni); }, style: { fontSize: 11, padding: "4px 6px", textAlign: "right" } }),
                    h("input", { type: "number", min: "0", placeholder: "Price", value: item.price, onChange: e => { const ni = [...keuntunganItems]; ni[i].price = +e.target.value || 0; ni[i].total = ni[i].qty * ni[i].price; setKeuntunganItems(ni); }, style: { fontSize: 11, padding: "4px 6px", textAlign: "right" } }),
                    h("div", { style: { fontSize: 11, fontWeight: 500, textAlign: "right" } }, "฿", formatCurrency(item.total)),
                    h("button", { onClick: () => setKeuntunganItems(keuntunganItems.filter((_, j) => j !== i)), style: { width: 40, height: 26, border: "1px solid var(--color-border-tertiary)", background: "white", borderRadius: 4, cursor: "pointer", fontSize: 12 } }, "×")
                  )
                ),
                h("button", { onClick: () => setKeuntunganItems([...keuntunganItems, { desc: "", qty: 0, price: 0, total: 0 }]), style: { width: "100%", padding: "6px", fontSize: 11, border: "1px solid var(--color-border-tertiary)", background: "var(--color-background-secondary)", borderRadius: 4, cursor: "pointer", marginBottom: 10 } }, "+ Tambah keuntungan"),
                h("div", { style: { fontSize: 12, display: "flex", justifyContent: "space-between", paddingTop: 8, fontWeight: 500, color: "#993556", borderTop: "0.5px solid var(--color-border-tertiary)" } },
                  h("span", null, "Total Keuntungan: "),
                  h("span", null, "฿" + formatCurrency(calc.totalKeuntungan))
                )
              ),

              // SISA SURPLUS
              h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13, fontWeight: 500, padding: "10px 12px", borderRadius: "var(--border-radius-md)", background: isSisaDeficit ? "#FCEBEB" : "#EAF3DE", color: isSisaDeficit ? "#791F1F" : "#27500A", marginBottom: 12 } },
                h("span", null, "SISA SURPLUS " + (isSisaDeficit ? "DEFISIT" : "")),
                h("span", null, isSisaDeficit ? "- ฿" + formatCurrency(calc.sisaSurplus) : "+ ฿" + formatCurrency(calc.sisaSurplus))
              ),

              // Pembagian PPIDK/PERMITHA (only if sisa surplus positive)
              !isSisaDeficit ? h(Section, { title: "Pembagian Hasil PPIDK/PERMITHA", accent: "purple" },
                h("div", { style: { marginBottom: 12 } },
                  h("div", { style: { fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 6 } }, "PPIDK: " + ppidk_perm_split + "%  |  PERMITHA: " + (100 - ppidk_perm_split) + "%"),
                  h("input", { type: "range", min: "0", max: "100", value: ppidk_perm_split, onChange: e => setPpidk_perm_split(+e.target.value), style: { width: "100%", marginBottom: 8 } }),
                  h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 } },
                    h("div", { style: { background: "#EEEDFE", borderRadius: "var(--border-radius-md)", padding: "8px 12px", textAlign: "center" } },
                      h("div", { style: { fontSize: 11, color: "#3C3489", marginBottom: 4 } }, "PPIDK"),
                      h("div", { style: { fontSize: 14, fontWeight: 500, color: "#3C3489" } }, "฿" + formatCurrency(calc.sisaSurplus * ppidk_perm_split / 100))
                    ),
                    h("div", { style: { background: "#E6F1FB", borderRadius: "var(--border-radius-md)", padding: "8px 12px", textAlign: "center" } },
                      h("div", { style: { fontSize: 11, color: "#185FA5", marginBottom: 4 } }, "PERMITHA"),
                      h("div", { style: { fontSize: 14, fontWeight: 500, color: "#185FA5" } }, "฿" + formatCurrency(calc.sisaSurplus * (100 - ppidk_perm_split) / 100))
                    )
                  )
                )
              ) : null
            )
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
