<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Anggaran Simposium - PPIDK Asia Oceania 2026</title>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
      --color-background-tertiary: #f6f7f8;
      --color-background-secondary: #f0f2f5;
      --color-background-primary: #ffffff;
      --color-border-tertiary: #e4e6eb;
      --color-text-primary: #050505;
      --color-text-secondary: #65676b;
      --color-text-tertiary: #8a8d91;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
    }

    input[type="number"],
    input[type="range"] {
      font-family: var(--font-sans);
    }

    input[type="number"] {
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      padding: 6px 8px;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #378ADD;
      box-shadow: 0 0 0 2px rgba(55, 138, 221, 0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 4px;
    }

    #root {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // Format number to Indonesian locale (Baht currency)
    const formatCurrency = (n) => Math.round(Math.abs(n)).toLocaleString("id-ID");

    function Field({ label, value, onChange, suffix = "Baht", small }) {
      return (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
          <label style={{ fontSize: small ? 12 : 13, color: "var(--color-text-secondary)", flex: 1 }}>
            {label}
          </label>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <input
              type="number"
              min="0"
              value={value}
              onChange={e => onChange(Math.max(0, Number(e.target.value) || 0))}
              style={{ width: 80, textAlign: "right", fontSize: 13 }}
            />
            <span style={{ fontSize: 11, color: "var(--color-text-tertiary)", width: 30 }}>
              {suffix}
            </span>
          </div>
        </div>
      );
    }

    function Section({ title, accent, children }) {
      const accentColors = {
        blue: { bg: "#E6F1FB", border: "#378ADD", text: "#0C447C" },
        green: { bg: "#EAF3DE", border: "#639922", text: "#3B6D11" },
        amber: { bg: "#FAEEDA", border: "#BA7517", text: "#854F0B" },
        teal: { bg: "#E1F5EE", border: "#1D9E75", text: "#0F6E56" },
        pink: { bg: "#FBEAF0", border: "#D4537E", text: "#993556" },
        red: { bg: "#FCEBEB", border: "#E24B4A", text: "#A32D2D" },
        purple: { bg: "#EEEDFE", border: "#7F77DD", text: "#3C3489" },
      };
      const color = accentColors[accent] || accentColors.blue;

      return (
        <div
          style={{
            background: "var(--color-background-primary)",
            border: "0.5px solid var(--color-border-tertiary)",
            borderRadius: "var(--border-radius-lg)",
            marginBottom: 12,
            overflow: "hidden"
          }}
        >
          <div
            style={{
              background: color.bg,
              borderBottom: `0.5px solid ${color.border}`,
              padding: "8px 14px",
              fontSize: 13,
              fontWeight: 500,
              color: color.text
            }}
          >
            {title}
          </div>
          <div style={{ padding: "12px 14px" }}>
            {children}
          </div>
        </div>
      );
    }

    function Row({ label, sub, right, bold, accent }) {
      return (
        <div
          style={{
            display: "flex",
            justifyContent: "space-between",
            alignItems: "flex-start",
            padding: "5px 0",
            borderBottom: "0.5px solid var(--color-border-tertiary)",
            background: accent ? "var(--color-background-secondary)" : "transparent"
          }}
        >
          <div>
            <div
              style={{
                fontSize: 13,
                color: bold ? "var(--color-text-primary)" : "var(--color-text-secondary)",
                fontWeight: bold ? 500 : 400
              }}
            >
              {label}
            </div>
            {sub && (
              <div style={{ fontSize: 11, color: "var(--color-text-tertiary)" }}>
                {sub}
              </div>
            )}
          </div>
          <div
            style={{
              fontSize: 13,
              fontWeight: bold ? 500 : 400,
              color: "var(--color-text-primary)",
              marginLeft: 8
            }}
          >
            {right}
          </div>
        </div>
      );
    }

    function MetricCard({ label, value, color }) {
      const cardColors = {
        green: { bg: "#EAF3DE", text: "#3B6D11", val: "#27500A" },
        red: { bg: "#FCEBEB", text: "#A32D2D", val: "#791F1F" },
        blue: { bg: "#E6F1FB", text: "#185FA5", val: "#0C447C" },
        amber: { bg: "#FAEEDA", text: "#854F0B", val: "#633806" },
        teal: { bg: "#E1F5EE", text: "#0F6E56", val: "#085041" },
      };
      const cardColor = cardColors[color] || cardColors.blue;

      return (
        <div
          style={{
            background: cardColor.bg,
            borderRadius: "var(--border-radius-md)",
            padding: "10px 14px",
            textAlign: "center"
          }}
        >
          <div style={{ fontSize: 11, color: cardColor.text, marginBottom: 4 }}>
            {label}
          </div>
          <div style={{ fontSize: 20, fontWeight: 500, color: cardColor.val }}>
            {value}
          </div>
        </div>
      );
    }

    function App() {
      // Thailand participants (by duration)
      const [t1n, setT1n] = useState(20);
      const [t1p, setT1p] = useState(1000);
      const [t1c, setT1c] = useState(400);
      const [t2n, setT2n] = useState(5);
      const [t2p, setT2p] = useState(1400);
      const [t2c, setT2c] = useState(800);
      const [t3n, setT3n] = useState(5);
      const [t3p, setT3p] = useState(3150);
      const [t3c, setT3c] = useState(1200);
      const [cityTour, setCityTour] = useState(1350);

      // Non-Thailand participants
      const [yn, setYn] = useState(20);
      const [yp, setYp] = useState(4000);

      // Committee members
      const [pthn, setPthn] = useState(17);
      const [pthp, setPthp] = useState(4000);
      const [pnonn, setPnonn] = useState(23);
      const [pnonp, setPnonp] = useState(4000);
      const [pReg, setPReg] = useState(44);

      // KBRI subsidy (venue)
      const [kbriQ, setKbriQ] = useState(70);
      const [kbriV, setKbriV] = useState(850);

      // Hotel and accommodations
      const [hotelPPN, setHotelPPN] = useState(700);
      const [hotelN, setHotelN] = useState(4);
      const [hotelCap, setHotelCap] = useState(2);

      // Souvenirs
      const [souvP, setSouvP] = useState(400);
      const [souvN, setSouvN] = useState(44);

      // Contingency
      const [contPP, setContPP] = useState(600);
      const [contUsage, setContUsage] = useState(0);

      const c = useMemo(() => {
        const tTotal = t1n + t2n + t3n;
        const pTotal = pthn + pnonn;
        const totalPaying = tTotal + yn + pTotal;

        const usedByThai = tTotal + pthn;
        const sisaKuota = Math.max(0, kbriQ - usedByThai);
        const pnonGratis = Math.min(pnonn, sisaKuota);
        const pnonBayarVenue = pnonn - pnonGratis;
        const kuotaHangus = Math.max(0, kbriQ - usedByThai - pnonGratis);
        const venuePayers = pnonBayarVenue + yn;
        const biayaVenue = venuePayers * kbriV;
        const subsidiTotal = (usedByThai + pnonGratis) * kbriV;

        const revT1 = t1n * t1p; const revT2 = t2n * t2p; const revT3 = t3n * t3p;
        const revY = yn * yp; const revPth = pthn * pthp; const revPnon = pnonn * pnonp;
        const revenue = revT1 + revT2 + revT3 + revY + revPth + revPnon;

        const opsMT1 = t1n * t1c; const opsMT2 = t2n * t2c; const opsMT3 = t3n * t3c;
        const opsMFull = (pTotal + yn) * t3c;
        const opsCT = (t3n + pTotal + yn) * cityTour;
        const opsTotal = opsMT1 + opsMT2 + opsMT3 + opsMFull + opsCT;

        const rooms = Math.ceil(pTotal / Math.max(1, hotelCap));
        const hotelCost = rooms * hotelPPN * hotelN;
        const souvCost = souvN * souvP;

        const contCollected = totalPaying * contPP;
        const contUsed = contCollected * (contUsage / 100);
        const contUnused = contCollected - contUsed;

        const totalCost = opsTotal + biayaVenue + hotelCost + souvCost + contUsed;
        const operationalSurplus = revenue - opsTotal - biayaVenue - hotelCost - souvCost;
        const totalSurplus = operationalSurplus + contUnused;

        const margT1 = t1p - t1c;
        const margT2 = t2p - t2c;
        const margT3 = t3p - t3c - cityTour;
        const margY = yp - t3c - cityTour - kbriV;
        const margPth = pthp - t3c - cityTour;
        const avgMargPnon = pnonn > 0 ? (pnonn * pnonp - pnonn * (t3c + cityTour) - pnonBayarVenue * kbriV) / pnonn : 0;

        return {
          tTotal, pTotal, totalPaying, usedByThai, sisaKuota, pnonGratis, pnonBayarVenue,
          kuotaHangus, venuePayers, biayaVenue, subsidiTotal,
          revT1, revT2, revT3, revY, revPth, revPnon, revenue,
          opsMT1, opsMT2, opsMT3, opsMFull, opsCT, opsTotal,
          rooms, hotelCost, souvCost,
          contCollected, contUsed, contUnused,
          totalCost, operationalSurplus, totalSurplus,
          margT1, margT2, margT3, margY, margPth, avgMargPnon,
        };
      }, [t1n,t1p,t1c,t2n,t2p,t2c,t3n,t3p,t3c,cityTour,yn,yp,pthn,pthp,pnonn,pnonp,pReg,kbriQ,kbriV,hotelPPN,hotelN,hotelCap,souvP,souvN,contPP,contUsage]);

      const isDeficit = c.totalSurplus < 0;
      const isOpsDeficit = c.operationalSurplus < 0;

      return (
        <div
          style={{
            fontFamily: "var(--font-sans)",
            background: "var(--color-background-tertiary)",
            minHeight: "100vh"
          }}
        >
          <div
            style={{
              background: "var(--color-background-primary)",
              borderBottom: "0.5px solid var(--color-border-tertiary)",
              padding: "12px 20px"
            }}
          >
            <div style={{ fontSize: 16, fontWeight: 500, color: "var(--color-text-primary)" }}>
              Kalkulator Anggaran Simposium
            </div>
            <div style={{ fontSize: 12, color: "var(--color-text-tertiary)" }}>
              PPIDK Asia Oceania 2026 · PERMITHA · semua nilai dapat diubah
            </div>
          </div>

          <div
            style={{
              background: isDeficit ? "#A32D2D" : "#3B6D11",
              padding: "16px 20px",
              display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12
            }}
          >
            {[
              { label: "Surplus akhir", value: `${isDeficit ? "- " : "+ "}฿${formatCurrency(c.totalSurplus)}`, big: true },
              { label: "Surplus operasional", value: `${isOpsDeficit ? "- " : "+ "}฿${formatCurrency(c.operationalSurplus)}` },
              { label: "Contingency tidak terpakai", value: `+ ฿${formatCurrency(c.contUnused)}` },
            ].map(({ label, value, big }) => (
              <div key={label} style={{ textAlign: "center" }}>
                <div style={{ fontSize: 11, color: isDeficit ? "#F7C1C1" : "#C0DD97", marginBottom: 2 }}>{label}</div>
                <div style={{ fontSize: big ? 24 : 18, fontWeight: 500, color: "white" }}>{value}</div>
              </div>
            ))}
          </div>

          <div style={{ padding: "16px 20px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>

            <div>
              <Section title="Peserta Thailand non-panitia  (venue disubsidi KBRI)" accent="blue">
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                    <thead>
                      <tr style={{ borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
                        {["Durasi","Jumlah","Harga tiket","Biaya ops"].map(h => (
                          <th key={h} style={{ textAlign: h === "Durasi" ? "left" : "right", padding: "4px 4px 6px", color: "var(--color-text-tertiary)", fontWeight: 400 }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        { dur: "1 hari", n: t1n, setN: setT1n, p: t1p, setP: setT1p, cc: t1c, setCc: setT1c },
                        { dur: "2 hari", n: t2n, setN: setT2n, p: t2p, setP: setT2p, cc: t2c, setCc: setT2c },
                        { dur: "3 hari", n: t3n, setN: setT3n, p: t3p, setP: setT3p, cc: t3c, setCc: setT3c },
                      ].map(({ dur, n, setN, p, setP, cc, setCc }) => (
                        <tr key={dur} style={{ borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
                          <td style={{ padding: "5px 4px", color: "var(--color-text-secondary)" }}>{dur}</td>
                          <td style={{ padding: "3px 4px", textAlign: "right" }}>
                            <input type="number" min="0" value={n} onChange={e => setN(Math.max(0,+e.target.value||0))} style={{ width: 52, textAlign: "right", fontSize: 12 }} />
                          </td>
                          <td style={{ padding: "3px 4px", textAlign: "right" }}>
                            <input type="number" min="0" value={p} onChange={e => setP(Math.max(0,+e.target.value||0))} style={{ width: 72, textAlign: "right", fontSize: 12 }} />
                          </td>
                          <td style={{ padding: "3px 4px", textAlign: "right" }}>
                            <input type="number" min="0" value={cc} onChange={e => setCc(Math.max(0,+e.target.value||0))} style={{ width: 72, textAlign: "right", fontSize: 12, background: "#FAEEDA" }} />
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div style={{ marginTop: 10, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <span style={{ fontSize: 12, color: "var(--color-text-secondary)" }}>Biaya city tour (3 hari) — Wat Arun + cruise + transport</span>
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    <input type="number" min="0" value={cityTour} onChange={e => setCityTour(Math.max(0,+e.target.value||0))} style={{ width: 72, textAlign: "right", fontSize: 12, background: "#FAEEDA" }} />
                    <span style={{ fontSize: 11, color: "var(--color-text-tertiary)" }}>Baht</span>
                  </div>
                </div>
                <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 4 }}>Kolom amber = biaya yang dikeluarkan per orang (bukan harga tiket)</div>
              </Section>

              <Section title="Peserta non-Thailand (full 3 hari)" accent="green">
                <div style={{ fontSize: 11, color: "#A32D2D", marginBottom: 8 }}>Membayar venue — tidak mendapat subsidi KBRI</div>
                <Field label="Jumlah" value={yn} onChange={setYn} suffix="org" />
                <Field label="Harga tiket" value={yp} onChange={setYp} />
              </Section>

              <Section title="Panitia" accent="purple">
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 500, color: "var(--color-text-tertiary)", marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 }}>Thailand</div>
                    <Field label="Jumlah" value={pthn} onChange={setPthn} suffix="org" small />
                    <Field label="Harga tiket" value={pthp} onChange={setPthp} small />
                  </div>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 500, color: "var(--color-text-tertiary)", marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 }}>Non-Thailand</div>
                    <Field label="Jumlah" value={pnonn} onChange={setPnonn} suffix="org" small />
                    <Field label="Harga tiket" value={pnonp} onChange={setPnonp} small />
                  </div>
                </div>
                <div style={{ borderTop: "0.5px solid var(--color-border-tertiary)", marginTop: 10, paddingTop: 10 }}>
                  <Field label="Total terdaftar (untuk souvenir, termasuk no-show)" value={pReg} onChange={setPReg} suffix="org" small />
                </div>
              </Section>

              <Section title="Subsidi KBRI (venue)" accent="amber">
                <Field label="Kuota total" value={kbriQ} onChange={setKbriQ} suffix="pax" />
                <Field label="Nilai per orang" value={kbriV} onChange={setKbriV} />
                <div style={{ background: "#FAEEDA", borderRadius: "var(--border-radius-md)", padding: "10px 12px", marginTop: 10, fontSize: 12, color: "#854F0B" }}>
                  <div>Dipakai Thai non-panitia: <b>{c.tTotal}</b> + Panitia Thai: <b>{pthn}</b> = <b>{c.usedByThai}</b></div>
                  <div style={{ marginTop: 4 }}>Sisa → Panitia non-Thai: <b>{c.pnonGratis}</b> gratis, <b>{c.pnonBayarVenue}</b> bayar venue</div>
                  <div style={{ marginTop: 4, color: c.kuotaHangus > 0 ? "#A32D2D" : "#3B6D11" }}>
                    Kuota hangus: <b>{c.kuotaHangus}</b> pax  |  Total subsidi: <b>฿{formatCurrency(c.subsidiTotal)}</b>
                  </div>
                </div>
              </Section>

              <Section title="Hotel panitia" accent="teal">
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
                  {[
                    { label: "Harga/kamar/malam", val: hotelPPN, set: setHotelPPN },
                    { label: "Jumlah malam", val: hotelN, set: setHotelN },
                    { label: "Kapasitas/kamar", val: hotelCap, set: setHotelCap, min: 1 },
                  ].map(({ label, val, set, min = 0 }) => (
                    <div key={label}>
                      <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 4 }}>{label}</div>
                      <input type="number" min={min} value={val} onChange={e => set(Math.max(min,+e.target.value||0))} style={{ width: "100%", textAlign: "right", fontSize: 13 }} />
                    </div>
                  ))}
                </div>
                <div style={{ background: "#E1F5EE", borderRadius: "var(--border-radius-md)", padding: "8px 12px", fontSize: 12, color: "#0F6E56" }}>
                  <b>{c.rooms} kamar</b> × ฿{formatCurrency(hotelPPN)} × {hotelN} malam = <b>฿{formatCurrency(c.hotelCost)}</b>
                </div>
              </Section>

              <Section title="Souvenir khusus panitia" accent="pink">
                <Field label="Harga per orang" value={souvP} onChange={setSouvP} />
                <Field label="Jumlah penerima" value={souvN} onChange={setSouvN} suffix="org" />
                <div style={{ background: "#FBEAF0", borderRadius: "var(--border-radius-md)", padding: "8px 12px", fontSize: 12, color: "#993556" }}>
                  {souvN} × ฿{formatCurrency(souvP)} = <b>฿{formatCurrency(c.souvCost)}</b>
                </div>
              </Section>

              <Section title="Contingency plan" accent="red">
                <Field label="Nilai per orang" value={contPP} onChange={setContPP} />
                <div style={{ marginTop: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                    <span style={{ fontSize: 13, color: "var(--color-text-secondary)" }}>Persentase digunakan</span>
                    <span style={{ fontSize: 13, fontWeight: 500, color: "#A32D2D" }}>{contUsage}% = ฿{formatCurrency(c.contUsed)}</span>
                  </div>
                  <input type="range" min="0" max="100" step="5" value={contUsage} onChange={e => setContUsage(+e.target.value)} style={{ width: "100%" }} />
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 2 }}>
                    <span>0% (semua jadi surplus)</span><span>100% (habis semua)</span>
                  </div>
                </div>
                <div style={{ background: "#FCEBEB", borderRadius: "var(--border-radius-md)", padding: "8px 12px", fontSize: 12, color: "#A32D2D", marginTop: 10 }}>
                  <div>Terkumpul: {c.totalPaying} pax × ฿{contPP} = <b>฿{formatCurrency(c.contCollected)}</b></div>
                  <div style={{ marginTop: 3 }}>Terpakai: <b>฿{formatCurrency(c.contUsed)}</b>  |  Tidak terpakai: <b>฿{formatCurrency(c.contUnused)}</b></div>
                </div>
              </Section>
            </div>

            <div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 12 }}>
                <MetricCard label="Total peserta" value={c.totalPaying + " org"} color={isDeficit ? "red" : "teal"} />
                <MetricCard label="Total pendapatan" value={"฿" + formatCurrency(c.revenue)} color="blue" />
                <MetricCard label="Total pengeluaran" value={"฿" + formatCurrency(c.totalCost)} color="amber" />
              </div>

              <Section title="Rincian pendapatan" accent="green">
                {[
                  { label: "Peserta Thailand 1 hari", n: t1n, p: t1p, rev: c.revT1, marg: c.margT1 },
                  { label: "Peserta Thailand 2 hari", n: t2n, p: t2p, rev: c.revT2, marg: c.margT2 },
                  { label: "Peserta Thailand 3 hari", n: t3n, p: t3p, rev: c.revT3, marg: c.margT3 },
                  { label: "Peserta non-Thailand", n: yn, p: yp, rev: c.revY, marg: c.margY },
                  { label: "Panitia Thailand", n: pthn, p: pthp, rev: c.revPth, marg: c.margPth },
                  { label: "Panitia non-Thailand", n: pnonn, p: pnonp, rev: c.revPnon, marg: c.avgMargPnon },
                ].map(({ label, n, p, rev, marg }) => (
                  <div key={label} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "5px 0", borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
                    <div>
                      <div style={{ fontSize: 13, color: "var(--color-text-primary)" }}>{label}</div>
                      <div style={{ fontSize: 11, color: "var(--color-text-tertiary)" }}>{n} org × ฿{formatCurrency(p)}  ·  margin ฿{formatCurrency(marg)}/org</div>
                    </div>
                    <div style={{ fontSize: 13, fontWeight: 500 }}>฿{formatCurrency(rev)}</div>
                  </div>
                ))}
                <div style={{ display: "flex", justifyContent: "space-between", paddingTop: 8, fontWeight: 500, fontSize: 14, color: "#3B6D11" }}>
                  <span>Total pendapatan</span><span>฿{formatCurrency(c.revenue)}</span>
                </div>
              </Section>

              <Section title="Rincian pengeluaran" accent="red">
                {[
                  { label: "Makan & souvenir — Thai 1 hari", detail: `${t1n} × ฿${formatCurrency(t1c)}`, val: c.opsMT1 },
                  { label: "Makan & souvenir — Thai 2 hari", detail: `${t2n} × ฿${formatCurrency(t2c)}`, val: c.opsMT2 },
                  { label: "Makan & souvenir — Thai 3 hari", detail: `${t3n} × ฿${formatCurrency(t3c)}`, val: c.opsMT3 },
                  { label: "Makan & souvenir — panitia + non-Thai", detail: `${c.pTotal + yn} × ฿${formatCurrency(t3c)}`, val: c.opsMFull },
                  { label: "City tour (3hr + panitia + non-Thai)", detail: `${t3n + c.pTotal + yn} × ฿${formatCurrency(cityTour)}`, val: c.opsCT },
                  { label: "Biaya venue (non-subsidi)", detail: `${c.venuePayers} pax × ฿${formatCurrency(kbriV)}`, val: c.biayaVenue, accent: true },
                  { label: "Hotel panitia", detail: `${c.rooms} kamar × ${hotelN} mlm × ฿${formatCurrency(hotelPPN)}`, val: c.hotelCost, accent: true },
                  { label: "Souvenir khusus panitia", detail: `${souvN} × ฿${formatCurrency(souvP)}`, val: c.souvCost, accent: true },
                  { label: `Contingency digunakan (${contUsage}%)`, detail: `฿${formatCurrency(c.contCollected)} × ${contUsage}%`, val: Math.round(c.contUsed), accent: true },
                ].map(({ label, detail, val, accent }) => (
                  <div key={label} style={{
                    display: "flex", justifyContent: "space-between", alignItems: "flex-start",
                    padding: "5px 0", borderBottom: "0.5px solid var(--color-border-tertiary)",
                    background: accent ? "var(--color-background-secondary)" : "transparent"
                  }}>
                    <div>
                      <div style={{ fontSize: 13, color: "var(--color-text-primary)" }}>{label}</div>
                      <div style={{ fontSize: 11, color: "var(--color-text-tertiary)" }}>{detail}</div>
                    </div>
                    <div style={{ fontSize: 13 }}>฿{formatCurrency(val)}</div>
                  </div>
                ))}
                <div style={{ display: "flex", justifyContent: "space-between", paddingTop: 8, fontWeight: 500, fontSize: 14, color: "#A32D2D" }}>
                  <span>Total pengeluaran</span><span>฿{formatCurrency(c.totalCost)}</span>
                </div>
              </Section>

              <Section title="Analisis subsidi KBRI" accent="amber">
                {[
                  { label: "Kuota KBRI", val: `${kbriQ} pax` },
                  { label: "Dipakai peserta Thailand non-panitia", val: `${c.tTotal} pax` },
                  { label: "Dipakai panitia Thailand", val: `${pthn} pax` },
                  { label: "Sisa untuk panitia non-Thailand", val: `${c.sisaKuota} pax` },
                  { label: "Panitia non-Thai gratis venue", val: `${c.pnonGratis} pax` },
                  { label: "Panitia non-Thai bayar venue", val: `${c.pnonBayarVenue} pax` },
                  { label: "Peserta non-Thai bayar venue", val: `${yn} pax` },
                  { label: "Total nilai subsidi KBRI", val: `฿${formatCurrency(c.subsidiTotal)}`, bold: true },
                  { label: "Kuota tidak terpakai (hangus)", val: `${c.kuotaHangus} pax`, warn: c.kuotaHangus > 0 },
                ].map(({ label, val, bold, warn }) => (
                  <div key={label} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", borderBottom: "0.5px solid var(--color-border-tertiary)", fontSize: 13 }}>
                    <span style={{ color: "var(--color-text-secondary)" }}>{label}</span>
                    <span style={{ fontWeight: bold ? 500 : 400, color: warn ? "#A32D2D" : "var(--color-text-primary)" }}>{val}</span>
                  </div>
                ))}
              </Section>

              <Section title="Analisis titik impas (operasional)" accent="purple">
                <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginBottom: 10 }}>Margin kontribusi per orang (sebelum contingency)</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, marginBottom: 12 }}>
                  {[
                    { label: "Thai 1hr", marg: c.margT1 },
                    { label: "Thai 2hr", marg: c.margT2 },
                    { label: "Thai 3hr", marg: c.margT3 },
                    { label: "Non-Thai", marg: c.margY },
                    { label: "Pan. Thai", marg: c.margPth },
                    { label: "Pan. non-Thai", marg: c.avgMargPnon },
                  ].map(({ label, marg }) => (
                    <div key={label} style={{
                      background: marg >= 0 ? "#EAF3DE" : "#FCEBEB",
                      borderRadius: "var(--border-radius-md)", padding: "8px", textAlign: "center"
                    }}>
                      <div style={{ fontSize: 11, color: marg >= 0 ? "#3B6D11" : "#A32D2D" }}>{label}</div>
                      <div style={{ fontSize: 15, fontWeight: 500, color: marg >= 0 ? "#27500A" : "#791F1F" }}>
                        {marg >= 0 ? "+" : "-"}฿{formatCurrency(marg)}
                      </div>
                    </div>
                  ))}
                </div>

                <div style={{
                  background: isOpsDeficit ? "#FCEBEB" : "#EAF3DE",
                  borderRadius: "var(--border-radius-md)", padding: "10px 12px",
                  fontSize: 13, fontWeight: 500, marginBottom: 10,
                  color: isOpsDeficit ? "#A32D2D" : "#3B6D11"
                }}>
                  Surplus operasional: {isOpsDeficit ? "- " : "+ "}฿{formatCurrency(c.operationalSurplus)}
                </div>

                {isOpsDeficit ? (
                  <div style={{ background: "#FAEEDA", borderRadius: "var(--border-radius-md)", padding: "10px 12px", fontSize: 12, color: "#854F0B" }}>
                    <div style={{ fontWeight: 500, marginBottom: 6 }}>Untuk menutup defisit ฿{formatCurrency(-c.operationalSurplus)}:</div>
                    {c.margY > 0 && <div>+ Tambah minimal <b>{Math.ceil(-c.operationalSurplus / c.margY)}</b> peserta non-Thailand</div>}
                    {c.margT3 > 0 && <div>+ Tambah minimal <b>{Math.ceil(-c.operationalSurplus / c.margT3)}</b> peserta Thailand 3 hari</div>}
                    {c.margT1 > 0 && <div>+ Tambah minimal <b>{Math.ceil(-c.operationalSurplus / c.margT1)}</b> peserta Thailand 1 hari</div>}
                  </div>
                ) : (
                  <div style={{ background: "#E6F1FB", borderRadius: "var(--border-radius-md)", padding: "10px 12px", fontSize: 12, color: "#185FA5" }}>
                    <div style={{ fontWeight: 500, marginBottom: 6 }}>Peserta bisa dikurangi hingga minimum:</div>
                    {c.margY > 0 && <div>Non-Thailand: min <b>{Math.max(0, yn - Math.floor(c.operationalSurplus / c.margY))}</b> orang (saat ini {yn})</div>}
                    {c.margT3 > 0 && t3n > 0 && <div>Thai 3 hari: min <b>{Math.max(0, t3n - Math.floor(c.operationalSurplus / c.margT3))}</b> orang (saat ini {t3n})</div>}
                    {c.margT1 > 0 && t1n > 0 && <div>Thai 1 hari: min <b>{Math.max(0, t1n - Math.floor(c.operationalSurplus / c.margT1))}</b> orang (saat ini {t1n})</div>}
                  </div>
                )}
              </Section>

              <div style={{
                background: "var(--color-background-primary)", border: `2px solid ${isDeficit ? "#E24B4A" : "#639922"}`,
                borderRadius: "var(--border-radius-lg)", padding: "16px"
              }}>
                <div style={{ fontSize: 14, fontWeight: 500, color: "var(--color-text-primary)", marginBottom: 10 }}>Ringkasan akhir</div>
                {[
                  { label: "Total peserta hadir", val: `${c.totalPaying} orang` },
                  { label: "  Thailand non-panitia", val: `${c.tTotal} orang` },
                  { label: "  Non-Thailand", val: `${yn} orang` },
                  { label: "  Panitia hadir", val: `${c.pTotal} orang` },
                ].map(({ label, val }) => (
                  <div key={label} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "3px 0", borderBottom: "0.5px solid var(--color-border-tertiary)", color: "var(--color-text-secondary)" }}>
                    <span>{label}</span><span>{val}</span>
                  </div>
                ))}
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "5px 0", borderBottom: "0.5px solid var(--color-border-tertiary)", fontWeight: 500, color: "#3B6D11" }}>
                  <span>Total pendapatan</span><span>฿{formatCurrency(c.revenue)}</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "5px 0", borderBottom: "0.5px solid var(--color-border-tertiary)", fontWeight: 500, color: "#A32D2D" }}>
                  <span>Total pengeluaran</span><span>฿{formatCurrency(c.totalCost)}</span>
                </div>
                <div style={{
                  display: "flex", justifyContent: "space-between", fontSize: 16, fontWeight: 500,
                  padding: "10px 12px", marginTop: 8, borderRadius: "var(--border-radius-md)",
                  background: isDeficit ? "#FCEBEB" : "#EAF3DE",
                  color: isDeficit ? "#791F1F" : "#27500A"
                }}>
                  <span>{isDeficit ? "DEFISIT AKHIR" : "SURPLUS AKHIR"}</span>
                  <span>{isDeficit ? "- " : "+ "}฿{formatCurrency(c.totalSurplus)}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
